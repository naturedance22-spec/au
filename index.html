<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Journey - Refined Layout</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            background-image: url('sora.jpg'); 
            background-size: cover;
            background-position: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: rgba(40, 40, 40, 0.6);
        }

        /* 1. 気球の調整：サイズを小さくし、上の方へ配置 */
        #balloon-container {
            position: absolute;
            top: 15%; /* 25%から15%へ引き上げ、文字との重なりを回避 */
            left: 10%;
            width: 240px; /* 320pxから240pxへ。画面の圧迫感を軽減 */
            z-index: 10;
            animation: floatBalloon 8s ease-in-out infinite;
            mix-blend-mode: normal; 
        }

        #balloon-container img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        @keyframes floatBalloon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-1deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(10px) rotate(1deg); }
        }

        /* 2. UIスタックの調整：右下の位置を微調整 */
        #ui-stack {
            position: absolute;
            bottom: 5%; /* 下端からの位置 */
            right: 8%;  /* 右端からの位置 */
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 20;
        }

        #input-area {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.4);
            padding: 8px 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        #input-weight {
            width: 55px;
            border: none;
            background: none;
            color: rgba(40, 40, 40, 0.9);
            font-size: 1.1rem;
            text-align: right;
            border-bottom: 1px solid rgba(40, 40, 40, 0.2);
            outline: none;
        }

        #submit-btn {
            background: rgba(40, 40, 40, 0.5);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #weight-display-area {
            text-align: right;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        #label-today {
            font-size: 0.9rem;
            opacity: 0.7;
            letter-spacing: 0.1em;
            margin-bottom: 0px;
        }

        #main-weight {
            font-size: 5rem; /* スマホで見やすいよう、少しコンパクトに */
            font-weight: bold;
            opacity: 0.9;
            line-height: 1;
        }
        #unit { font-size: 1.8rem; margin-left: 5px; }

        #prev-weight {
            font-size: 1.3rem;
            opacity: 0.6;
            margin-top: 5px;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <div id="balloon-container">
        <img src="balloon2.png" alt="Balloon">
    </div>

    <div id="ui-stack">
        <div id="input-area">
            <input type="number" id="input-weight" placeholder="00.0" step="0.1">
            <span style="font-size: 0.9rem;">kg</span>
            <button id="submit-btn">OK</button>
        </div>

        <div id="weight-display-area">
            <div id="label-today">今日の体重</div>
            <div id="main-weight">
                <span id="display-value">00.0</span><span id="unit">kg</span>
            </div>
            <div id="prev-weight">
                (前回: <span id="prev-value">--.-</span>kg)
            </div>
        </div>
    </div>

    <script>
        const inputWeight = document.getElementById('input-weight');
        const submitBtn = document.getElementById('submit-btn');
        const displayValue = document.getElementById('display-value');
        const prevWeightArea = document.getElementById('prev-weight');
        const prevValue = document.getElementById('prev-value');

        let previousWeightValue = null;

        submitBtn.addEventListener('click', () => {
            const inputValue = inputWeight.value;
            if (inputValue) {
                if (previousWeightValue !== null) {
                    prevValue.textContent = previousWeightValue;
                    prevWeightArea.style.visibility = 'visible';
                }
                displayValue.textContent = inputValue;
                previousWeightValue = inputValue;
                inputWeight.value = '';
            }
        });
    </script>

</body>
</html>
