<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Journey - Image UI Version</title>
    <style>
        /* 1. 舞台設定：オーロラ背景 */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            /* あなたが用意したオーロラ画像を指定 */
            background-image: url('YOUR_AURORA_BACKGROUND.jpg'); 
            background-size: cover;
            background-position: center;
            background-color: #000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: white;
        }

        /* 2. 主役：画像バージョンの気球（黒背景を透過させる） */
        #balloon-container {
            position: absolute;
            top: 25%;
            left: 15%;
            width: 320px; /* 画像に合わせてサイズ調整 */
            z-index: 10;
            /* 周期8秒、移動幅10pxのゆったりした揺れ */
            animation: floatBalloon 8s ease-in-out infinite;
            
            /* 黒背景を透明にし、白や色を背景と合成する魔法 */
            mix-blend-mode: screen; 
        }

        #balloon-container img {
            width: 100%;
            height: auto;
            filter: contrast(1.1) brightness(1.1);
        }

        @keyframes floatBalloon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-1deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(10px) rotate(1deg); }
        }

        /* 3. 表示と入力の統合エリア（右下配置） */
        #ui-stack {
            position: absolute;
            bottom: 8%;
            right: 10%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 20;
        }

        /* 入力UI：体重表示の上に配置 */
        #input-area {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 12px;
            backdrop-filter: blur(6px); /* 背後を少しぼかす */
        }
        #input-weight {
            width: 60px;
            border: none;
            background: none;
            color: white;
            font-size: 1.2rem;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.6);
            outline: none;
        }
        #submit-btn {
            background: rgba(255, 255, 255, 0.85);
            color: #222;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* 体重表示エリア（白の半透明） */
        #weight-display-area {
            text-align: right;
            pointer-events: none;
        }

        #label-today {
            font-size: 1.1rem;
            opacity: 0.5;
            letter-spacing: 0.15em;
            margin-bottom: 2px;
        }

        #main-weight {
            font-size: 6.5rem;
            font-weight: bold;
            opacity: 0.75;
            line-height: 0.9;
        }
        #unit { font-size: 2.2rem; margin-left: 10px; }

        #prev-weight {
            font-size: 1.6rem;
            opacity: 0.45;
            margin-top: 10px;
            visibility: hidden; /* 初回は非表示 */
        }
    </style>
</head>
<body>

    <div id="balloon-container">
        <img src="balloon.jpg" alt="Balloon">
    </div>

    <div id="ui-stack">
        <div id="input-area">
            <input type="number" id="input-weight" placeholder="00.0" step="0.1">
            <span style="font-size: 1rem; opacity: 0.8;">kg</span>
            <button id="submit-btn">OK</button>
        </div>

        <div id="weight-display-area">
            <div id="label-today">今日の体重</div>
            <div id="main-weight">
                <span id="display-value">00.0</span><span id="unit">kg</span>
            </div>
            <div id="prev-weight">
                (前回: <span id="prev-value">--.-</span>kg)
            </div>
        </div>
    </div>

    <script>
        const inputWeight = document.getElementById('input-weight');
        const submitBtn = document.getElementById('submit-btn');
        const displayValue = document.getElementById('display-value');
        const prevWeightArea = document.getElementById('prev-weight');
        const prevValue = document.getElementById('prev-value');

        let previousWeightValue
